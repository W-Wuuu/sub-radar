<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅雷达 — 查教程 · 算账单 · 管到期</title>

<style>
:root {
  --p: #6C5CE7; --pd: #5A4BD1; --r: #E17055;
  --bg: #F8F9FA; --c: #FFF; --t: #2D3436; --ts: #636E72; --b: #DFE6E9;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--t); line-height: 1.6; }

/* Header */
header { background: linear-gradient(135deg, #6C5CE7, #A855F7); color: white; padding: 40px 20px 36px; text-align: center; }
header h1 { font-size: 26px; font-weight: 800; }
header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

/* Tabs */
.tabs { display: flex; gap: 4px; max-width: 640px; margin: -18px auto 0; padding: 0 16px; position: relative; z-index: 1; }
.tab { flex: 1; padding: 14px 8px; border: none; border-radius: 14px 14px 0 0; font-size: 15px; font-weight: 700; cursor: pointer; background: #EDE7F6; color: var(--p); transition: all 0.2s; font-family: inherit; }
.tab.active { background: white; color: var(--t); box-shadow: 0 -2px 12px rgba(0,0,0,0.04); }
.tab .emoji { font-size: 18px; display: block; margin-bottom: 2px; }

/* Container */
.container { max-width: 640px; margin: 0 auto; padding: 0 16px 40px; }

/* Panels */
.panel { display: none; background: white; border-radius: 0 0 16px 16px; padding: 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.04); }
.panel.active { display: block; }
.panel h2 { font-size: 20px; margin-bottom: 16px; }

/* ===== 查 ===== */
.search-box { display: flex; gap: 8px; margin-bottom: 16px; }
.search-box input { flex: 1; padding: 14px 16px; border: 2px solid var(--b); border-radius: 12px; font-size: 16px; font-family: inherit; }
.search-box input:focus { outline: none; border-color: var(--p); }
.search-box button { padding: 14px 20px; background: var(--p); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
.quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.chip { padding: 6px 12px; background: #F0EDFF; border: 1px solid #D5CCF7; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit; color: var(--p); }
.chip:hover { background: var(--p); color: white; border-color: var(--p); }
.result-card { background: #F8F6FF; border-radius: 14px; padding: 20px; margin-top: 16px; display: none; }
.result-card.show { display: block; }
.result-card .plat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.result-card .plat-icon { font-size: 32px; }
.result-card .plat-name { font-size: 20px; font-weight: 800; }
.result-card .plat-meta { font-size: 13px; color: var(--ts); margin-top: 2px; }
.result-card ol { margin: 0 0 16px 20px; }
.result-card ol li { padding: 6px 0; font-size: 14px; line-height: 1.6; }
.result-card .tip { background: #FFF9E6; padding: 12px 16px; border-radius: 10px; font-size: 13px; color: #8B6914; }

/* ===== 算 ===== */
.calc-frame { width: 100%; height: 750px; border: none; border-radius: 12px; }

/* ===== 管 ===== */
.reminder-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.reminder-form input { padding: 14px 16px; border: 2px solid var(--b); border-radius: 12px; font-size: 15px; font-family: inherit; }
.reminder-form input:focus { outline: none; border-color: var(--p); }
.reminder-form .row { display: flex; gap: 8px; }
.reminder-form .row input { flex: 1; }
.reminder-form button { padding: 14px; background: var(--p); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.reminder-form button:disabled { background: #B2BEC3; cursor: not-allowed; }
.quota-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--ts); }
.quota-bar .dots { display: flex; gap: 4px; }
.quota-bar .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--b); }
.quota-bar .dot.used { background: var(--p); }
.reminder-list { list-style: none; }
.reminder-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #F8F9FA; border-radius: 10px; margin-bottom: 8px; }
.reminder-item .rinfo { flex:1; }
.reminder-item .rname { font-weight: 700; font-size: 15px; }
.reminder-item .rdate { font-size: 12px; color: var(--ts); }
.reminder-item .rdelete { width: 32px; height: 32px; border-radius: 8px; border: none; background: #FFEAA7; color: var(--r); font-size: 18px; cursor: pointer; }
.empty-state { text-align: center; padding: 30px; color: var(--ts); }
.empty-state .big-emoji { font-size: 40px; margin-bottom: 8px; }

/* Footer */
footer { text-align: center; padding: 24px; color: var(--ts); font-size: 12px; border-top: 1px solid var(--b); margin-top: 32px; }
footer a { color: var(--p); text-decoration: none; }

@media (max-width: 500px) {
  header h1 { font-size: 22px; }
  .tab { font-size: 13px; padding: 12px 6px; }
  .tab .emoji { font-size: 16px; }
}
</style>

// ============================================================
// Tab 切换
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['search','calc','remind'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'remind') renderReminders();
}

// ============================================================
// 查 — 搜索
// ============================================================
function initQuickChips() {
  const container = document.getElementById('quickChips');
  const popular = ['微信支付','支付宝','爱奇艺','B站','iCloud+','百度网盘','网易云音乐','QQ音乐','腾讯视频','京东PLUS'];
  container.innerHTML = popular.map(p => `<button class="chip" onclick="searchPlatform('${p}')">${p}</button>`).join('');
}
initQuickChips();

function searchPlatform(query) {
  document.getElementById('searchInput').value = query;
  doSearch();
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const card = document.getElementById('resultCard');
  if (!q) { card.classList.remove('show'); return; }

  // 精确匹配 + 别名匹配 + 模糊匹配
  let match = null;
  for (const p of PLATFORMS) {
    if (p.name.toLowerCase().includes(q) || p.name.toLowerCase() === q) { match = p; break; }
    for (const a of p.aliases) {
      if (a.toLowerCase().includes(q) || a.toLowerCase() === q) { match = p; break; }
    }
    if (match) break;
  }
  // 模糊匹配
  if (!match) {
    for (const p of PLATFORMS) {
      if (p.name.toLowerCase().split('').filter(c => q.includes(c)).length >= Math.min(q.length, 3)) { match = p; break; }
    }
  }

  if (!match) {
    card.classList.add('show');
    card.innerHTML = `<div style="text-align:center;padding:20px;color:var(--ts);">
      <div style="font-size:40px;margin-bottom:8px;">🤔</div>
      <p>未找到「${q}」的取消教程</p>
      <p style="font-size:13px;">试试搜索：微信支付、支付宝、爱奇艺、B站…</p>
      <p style="font-size:12px;margin-top:8px;">没找到你需要的平台？发邮件到 feedback@subradar.dev 告诉我们。</p>
    </div>`;
    return;
  }

  document.getElementById('platIcon').textContent = match.icon;
  document.getElementById('platName').textContent = match.name;
  document.getElementById('platMeta').textContent = `${match.category} · 难度 ${match.difficulty} · 耗时 ${match.time}`;
  document.getElementById('platSteps').innerHTML = match.steps.map((s,i) => `<li>${s}</li>`).join('');
  document.getElementById('platTip').textContent = '💡 ' + match.tip;
  card.classList.add('show');
}

// ============================================================
// 管 — 提醒系统
// ============================================================
const MAX_MONTHLY = 3;

function getReminders() {
  try { return JSON.parse(localStorage.getItem('subradar_reminders') || '[]'); }
  catch(e) { return []; }
}

function saveReminders(list) {
  localStorage.setItem('subradar_reminders', JSON.stringify(list));
}

function getMonthlyCount() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${now.getMonth()}`;
  return getReminders().filter(r => {
    const d = new Date(r.createdAt);
    return `${d.getFullYear()}-${d.getMonth()}` === thisMonth;
  }).length;
}

function addReminder() {
  const name = document.getElementById('remindName').value.trim();
  const date = document.getElementById('remindDate').value;
  const email = document.getElementById('remindEmail').value.trim();

  if (!name) { alert('请输入订阅名称'); return; }
  if (!date) { alert('请选择到期日期'); return; }
  if (!email) { alert('请输入邮箱地址'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('邮箱格式不正确'); return; }

  const selected = new Date(date);
  const today = new Date();
  today.setHours(0,0,0,0);
  if (selected < today) { alert('到期日必须在今天之后'); return; }

  const monthly = getMonthlyCount();
  if (monthly >= MAX_MONTHLY) {
    alert(`本月已使用 ${MAX_MONTHLY}/${MAX_MONTHLY} 次免费提醒。下月自动重置。`);
    return;
  }

  const reminders = getReminders();
  reminders.push({
    id: Date.now(),
    name,
    expireDate: date,
    email,
    createdAt: new Date().toISOString(),
    notified: false
  });
  saveReminders(reminders);
  renderReminders();

  // Clear form
  document.getElementById('remindName').value = '';
  document.getElementById('remindDate').value = '';
  document.getElementById('remindEmail').value = '';

  // Trigger notification scheduling (client-side for now; server-side via Cloudflare Function when deployed)
  scheduleNotification(name, date, email);
}

async function scheduleNotification(name, date, email) {
  const threeDaysBefore = new Date(date);
  threeDaysBefore.setDate(threeDaysBefore.getDate() - 3);

  // Try Cloudflare Function first
  try {
    const resp = await fetch('/api/send-reminder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, subName: name, expireDate: date })
    });
    const data = await resp.json();
    if (data.success) {
      console.log('✅ 提醒已设置:', data.message);
    }
  } catch (e) {
    // Fallback: store locally, show browser notification if available
    console.log('ℹ️ 提醒已保存到本地。邮件服务将在后台处理。');
    if ('Notification' in window && Notification.permission === 'granted') {
      const delay = threeDaysBefore.getTime() - Date.now();
      if (delay > 0) {
        setTimeout(() => {
          new Notification(`⏰ ${name} 即将到期`, {
            body: `你的 ${name} 将于 ${date} 到期。建议检查是否需要取消自动续费。`,
            icon: '/favicon.ico'
          });
        }, Math.min(delay, 2147483647)); // 限制最大延时
      }
    }
  }
}

function deleteReminder(id) {
  const reminders = getReminders().filter(r => r.id !== id);
  saveReminders(reminders);
  renderReminders();
}

function renderReminders() {
  const list = document.getElementById('reminderList');
  const reminders = getReminders();
  const monthly = getMonthlyCount();
  const remaining = MAX_MONTHLY - monthly;

  // Quota dots
  document.getElementById('quotaDots').innerHTML = Array.from({length: MAX_MONTHLY}, (_, i) =>
    `<span class="dot${i < monthly ? ' used' : ''}"></span>`
  ).join('');
  document.getElementById('quotaText').textContent = `${remaining}/${MAX_MONTHLY} 次剩余`;
  document.getElementById('remindBtn').disabled = remaining <= 0;

  if (reminders.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="big-emoji">📭</div><p>还没有设置提醒</p><p style="font-size:13px;">添加你的订阅到期日，到期前3天我们会发邮件提醒你。</p></div>`;
    return;
  }

  // Sort by expire date
  reminders.sort((a,b) => new Date(a.expireDate) - new Date(b.expireDate));

  list.innerHTML = reminders.map(r => {
    const expireDate = new Date(r.expireDate);
    const today = new Date(); today.setHours(0,0,0,0);
    const daysLeft = Math.ceil((expireDate - today) / (1000*60*60*24));
    let statusText = '';
    if (daysLeft < 0) statusText = '（已过期）';
    else if (daysLeft === 0) statusText = '（今天到期！）';
    else if (daysLeft <= 3) statusText = `（仅剩${daysLeft}天！）`;
    else statusText = `（${daysLeft}天后到期）`;

    return `
      <li class="reminder-item">
        <div class="rinfo">
          <div class="rname">${escapeHtml(r.name)} <span style="font-size:12px;color:${daysLeft<=3?'var(--r)':'var(--ts)'}">${statusText}</span></div>
          <div class="rdate">📅 ${r.expireDate} · 📧 ${escapeHtml(r.email)}</div>
        </div>
        <button class="rdelete" onclick="deleteReminder(${r.id})" title="删除">×</button>
      </li>`;
  }).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// 初始化
// ============================================================
renderReminders();

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  // Don't request on load; wait for user interaction
  document.addEventListener('click', function askOnce() {
    Notification.requestPermission();
    document.removeEventListener('click', askOnce);
  }, { once: true });
}
</script>
</body>
</html>
